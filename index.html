<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1-1 Grid Map Development</title>
    <link rel="stylesheet" href="static/style.css">
    <!-- Load Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>HW1-1 網格地圖開發</h1>
        </header>

        <section class="controls">
            <label for="grid-size">Enter a number between 5 and 9:</label>
            <input type="number" id="grid-size" min="5" max="9" value="5">
            <button id="generate-btn">Generate Square</button>
        </section>

        <section class="grid-section">
            <h2 id="grid-title">5 x 5 Square:</h2>
            <p class="instruction">
                Click on a cell to set up the start grid as green, the end grid as red, and remaining obstacles as gray.
            </p>
            <div id="grid-container" class="grid-container"></div>
            <div class="status-panel">
                <span class="status-indicator">Please click to select Start Cell (Green)</span>
            </div>
        </section>
    </div>

    <script src="static/script.js"></script>
</body>

</html>
